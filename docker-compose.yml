services:
  db:
    image: postgres:16-alpine
    container_name: maurisante-db
    environment:
      POSTGRES_DB: maurisante
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - maurisante_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d maurisante"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: maurisante-backend
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/maurisante?schema=public
      JWT_ACCESS_SECRET: change_me_access_secret
      JWT_REFRESH_SECRET: change_me_refresh_secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL_DAYS: 30
      CORS_ORIGIN: http://localhost:5173
      ADMIN_EMAIL: admin@maurisante.mr
      ADMIN_PASSWORD: Admin12345!
      ADMIN_NAME: MauriSante Admin
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

volumes:
  maurisante_pgdata:
